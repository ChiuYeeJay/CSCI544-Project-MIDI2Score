model:
  decoder:
    vocab_size: 5000
    d_model: 512
    nhead: 8
    num_layers: 4
    dim_feedforward: 2048
    dropout: 0.05
    activation: swiglu
    pad_token_id: 0
    bos_token_id: 1
    eos_token_id: 2
    max_length: 1024
    positional_encoding: sinusoidal
  
  encoder:
    d_model: 512
    nhead: 8
    num_layers: 8
    dim_feedforward: 2048
    dropout: 0.05
    activation: "swiglu"
    max_length: 1024
    position_encoding_type: sinusoidal

    # CPWord: family, position, pitch, duration, program (instrument), tempo, time signature
    src_vocab_size_list: [3, 131, 130, 102, 131, 34, 66]
    src_embedding_size_list: [8, 64, 64, 64, 32, 32, 32]

    pad_token_id: 0
    bos_token_id: 1
    eos_token_id: 2

data:
  dataset_path: DATA/huggingface_seq2seq_truncated

  max_source_length: 128
  max_target_length: 128

  tokenizer_path: DATA/tokenizer_rd.json

  length_bucketing: true
  bucket_size_multiplier: 50
  bucketing_mode: mixed
  source_length_weight: 0.2

  num_workers: 0
  shuffle_seed: 42

  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2

  curriculum_stage_prob: 
    - [1.0, 0.0, 0.0]
    - [0.25, 0.75, 0.0]
    - [0.1, 0.4, 0.5]


training:
  # ===== pretrained decoder =====
  pretrained_decoder_path: DATA/qkv_sin_normfix.pt


  # ===== batch & optimizer =====
  batch_size: 2
  accumulate_grad_batches: 1
  precision: bf16-mixed
  learning_rate: 0.0005
  weight_decay: 0.01
  grad_clip_norm: 1.0

  label_smoothing: 0.0

  # ===== scheduler =====
  scheduler: linear
  warmup_ratio: 0.05
  min_lr_ratio: 0.1

  # ===== training =====
  num_steps: 200
  num_epochs: null
  max_duration_seconds: null

  # ===== eval =====
  val_check_interval: 50
  check_val_every_n_epoch: null
  num_eval_batches: 8

  early_stopping_patience: null
  early_stopping_min_delta: 0.0

  # ===== logging =====
  log_every: 50

  device: auto

  # ===== checkpoint =====
  save_checkpoint_path: artifacts/seq2seq/latest.pt
  save_best_checkpoint_path: artifacts/seq2seq/best.pt
  resume_checkpoint_path: null

  # ===== logs =====
  csv_log_path: logs/seq2seq.csv
  tensorboard_log_dir: logs/tensorboard

  # ===== Training strategy =====
  training_mode: lora
  decoder_pretrained_learning_rate: null
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05

  curriculum_learning: true
  curriculum_epoch_schedule: [0, 4, 7]