model:
  decoder:
    vocab_size: 5000
    d_model: 512
    nhead: 8
    num_layers: 4
    dim_feedforward: 2048
    dropout: 0.05
    activation: swiglu
    pad_token_id: 0
    bos_token_id: 1
    eos_token_id: 2
    max_length: 1024
  
  encoder:
    d_model: 512
    nhead: 8
    num_layers: 8
    dim_feedforward: 2048
    dropout: 0.05
    activation: "swiglu"
    max_length: 2048
    position_encoding_type: "sinusoidal"

    # CPWord: family, position, pitch, duration, program (instrument), tempo, time signature
    src_vocab_size_list: [3, 131, 130, 102, 131, 34, 66]
    src_embedding_size_list: [8, 64, 64, 64, 32, 32, 32]

    pad_token_id: 0
    bos_token_id: 1
    eos_token_id: 2

data:
  dataset_path: DATA/huggingface_seq2seq_rd
  split: training

  max_source_length: 128
  max_target_length: 128


  tokenizer_path: DATA/tokenizer_rd.json

  random_crop: true
  crop_seed: 23

  sliding_window_stride: null

  length_bucketing: false
  bucket_size_multiplier: 50

  num_workers: 0

  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2


training:
  # ===== pretrained decoder =====
  pretrained_decoder_path: best_models/rd/best.pt

  # ===== batch & optimizer =====
  batch_size: 2
  accumulate_grad_batches: 1
  precision: bf16-mixed
  learning_rate: 0.0005
  weight_decay: 0.01
  grad_clip_norm: 1.0

  label_smoothing: 0.0

  # ===== scheduler =====
  scheduler: linear
  warmup_steps: 100
  min_lr_ratio: 0.1

  # ===== training =====
  num_steps: 500   # ⚠️ 先小一点测试 pipeline
  max_duration_seconds: null

  # ===== eval =====
  eval_every: 50
  num_eval_batches: 8

  early_stopping_patience: null
  early_stopping_min_delta: 0.0

  # ===== logging =====
  log_every: 50

  device: auto

  # ===== checkpoint =====
  save_checkpoint_path: artifacts/seq2seq/latest.pt
  save_best_checkpoint_path: artifacts/seq2seq/best.pt
  resume_checkpoint_path: null

  # ===== logs =====
  csv_log_path: logs/seq2seq.csv
  tensorboard_log_dir: logs/tensorboard/seq2seq

  # ===== freeze strategy =====
  freeze_encoder: false
  freeze_decoder: false